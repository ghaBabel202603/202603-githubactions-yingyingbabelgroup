name: 13 - Working with Outputs

on:
  workflow_dispatch:
    inputs:
      build-status:
        type: choice
        description: "Choose the build status for the demo"
        default: success
        options:
          - success
          - failure

jobs:

  build:
    runs-on: ubuntu-latest

    outputs:
      build-status: ${{ steps.build.outputs.status }}

    steps:
      - name: Print GITHUB_OUTPUT path
        run: echo "GITHUB_OUTPUT path: $GITHUB_OUTPUT"

      - name: Build
        id: build
        run: echo "status=${{ github.event.inputs['build-status'] }}" >> "$GITHUB_OUTPUT"

      - name: Print GITHUB_OUTPUT path after inserting 'build-status'
        run: echo "GITHUB_OUTPUT path: $GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.build-status == 'success'

    steps:
      - name: Deploy
        run: echo "Deploying"