name: 14 - Using Cache

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: "Node version"
        required: true
        default: "20.x"
        type: string

jobs:

  install-deps:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 14-caching/react-app

    outputs:
      deps-cache-key: ${{ steps.cache-key.outputs.CACHE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Calculate cache key
        id: cache-key
        run: |
          echo "CACHE_KEY=deps-node-modules-${{ hashFiles('14-caching/react-app/package-lock.json') }}" >> "$GITHUB_OUTPUT"

      - name: Download cached dependencies
        uses: actions/cache@v4
        with:
          path: 14-caching/react-app/node_modules
          key: ${{ steps.cache-key.outputs.CACHE_KEY }}

      - name: Install dependencies
        run: npm ci

  linting:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: 14-caching/react-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Download cached dependencies
        uses: actions/cache@v4
        with:
          path: 14-caching/react-app/node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }}

      - name: Testing
        run: npm run test

      - name: Linting
        run: echo "Linting..."

  build:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: 14-caching/react-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Download cached dependencies
        uses: actions/cache@v4
        with:
          path: 14-caching/react-app/node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }}

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

      - name: Deploying
        run: echo "Deploying..."