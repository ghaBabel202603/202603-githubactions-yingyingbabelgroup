name: 08 - Expressions

run-name: 08 - Expressions | DEBUG - ${{ inputs.debug == 'true' && 'ON' || 'OFF' }}

on:
  workflow_dispatch:
    inputs:
      debug:
        description: Enable debug mode
        type: boolean
        default: false

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: ${{ inputs.debug }} Print start-up
        if: ${{ inputs.debug }}
        run: |
          echo "Triggered by: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Runner OS: ${{ runner.os }}"

      - name: ${{ inputs.debug }} Print when triggered from main
        if: ${{ inputs.debug && github.ref_name == 'main' }}
        run: echo "This workflow was triggered from the main branch."

      - name: Greeting
        run: echo "${{ vars.MY_VAR }}"

